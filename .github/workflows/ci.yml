name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # ODE uses macOS 26 SDK APIs (SpeechAnalyzer, FoundationModels), so the
    # runner needs Xcode 26.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Cache binary dependencies
        uses: actions/cache@v5
        with:
          path: |
            third_party/sherpa
            Resources/dpdfnet2_48khz_hr.onnx
          key: sherpa-deps-${{ hashFiles('scripts/fetch-deps.sh') }}

      - name: Fetch binary dependencies
        run: |
          if [ ! -f Resources/dpdfnet2_48khz_hr.onnx ]; then
            ./scripts/fetch-deps.sh
          fi

      - name: Build
        run: swift build

      - name: Test
        run: swift test --enable-code-coverage

      - name: Coverage summary
        run: |
          PROF=".build/arm64-apple-macosx/debug/codecov/default.profdata"
          BIN=".build/arm64-apple-macosx/debug/odePackageTests.xctest/Contents/MacOS/odePackageTests"
          if [ -f "$PROF" ] && [ -f "$BIN" ]; then
            xcrun llvm-cov report "$BIN" -instr-profile "$PROF" \
              -ignore-filename-regex="Tests|checkouts|CSherpa" | tail -3
          fi
