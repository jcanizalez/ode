name: Release

# Tag-triggered release: builds the drivers + app + installer, signs with
# Developer ID, notarizes, staples, and attaches the pkg to a GitHub release.
#
# Required repository secrets:
#   MAC_CERT_APPLICATION       base64 .p12 with the "Developer ID Application"
#                              identity (+ CA chain)
#   MAC_CERT_INSTALLER         base64 .p12 with the "Developer ID Installer"
#                              identity (+ CA chain)
#   MAC_CERTIFICATE_PASSWORD   password of both .p12 files
#   APPSTORE_KEY_ID            App Store Connect API key ID
#   APPSTORE_ISSUER_ID         App Store Connect issuer ID
#   APPSTORE_P8                base64 of the AuthKey_*.p8 (for notarytool)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # ODE uses macOS 26 SDK APIs (SpeechAnalyzer, FoundationModels), so the
    # runner needs Xcode 26.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Determine version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="v0.0.0-manual"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Cache binary dependencies
        uses: actions/cache@v5
        with:
          path: |
            third_party/sherpa
            Resources/dpdfnet2_48khz_hr.onnx
          key: sherpa-deps-${{ hashFiles('scripts/fetch-deps.sh') }}

      - name: Fetch binary dependencies
        run: |
          if [ ! -f Resources/dpdfnet2_48khz_hr.onnx ]; then
            ./scripts/fetch-deps.sh
          fi

      - name: Import signing certificates
        env:
          MAC_CERT_APPLICATION: ${{ secrets.MAC_CERT_APPLICATION }}
          MAC_CERT_INSTALLER: ${{ secrets.MAC_CERT_INSTALLER }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          echo "$MAC_CERT_APPLICATION" | base64 --decode > cert_app.p12
          echo "$MAC_CERT_INSTALLER" | base64 --decode > cert_installer.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          for f in cert_app.p12 cert_installer.p12; do
            security import "$f" -k build.keychain \
              -P "$MAC_CERTIFICATE_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/productsign
          done
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productsign: \
            -s -k actions build.keychain
          rm cert_app.p12 cert_installer.p12
          security find-identity -v build.keychain

      - name: Build drivers
        run: ./scripts/build-driver.sh

      - name: Build app
        env:
          ODE_VERSION: ${{ steps.ver.outputs.version }}
        run: ./scripts/build-app.sh

      - name: Build installer
        env:
          ODE_VERSION: ${{ steps.ver.outputs.version }}
        run: ./scripts/build-pkg.sh

      - name: Notarize and staple
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_P8: ${{ secrets.APPSTORE_P8 }}
        run: |
          PKG="dist/ODE-${{ steps.ver.outputs.version }}.pkg"
          echo "$APPSTORE_P8" | base64 --decode > authkey.p8
          xcrun notarytool submit "$PKG" \
            --key authkey.p8 \
            --key-id "$APPSTORE_KEY_ID" \
            --issuer "$APPSTORE_ISSUER_ID" \
            --wait
          rm authkey.p8
          xcrun stapler staple "$PKG"

      - name: Create release and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          PKG="dist/ODE-${{ steps.ver.outputs.version }}.pkg"

          is_prerelease=false
          if [[ "$tag" == *"-beta"* ]] || [[ "$tag" == *"-alpha"* ]] || [[ "$tag" == *"-rc"* ]]; then
            is_prerelease=true
          fi

          if gh release view "$tag" &>/dev/null; then
            echo "Release $tag exists — uploading artifact"
          else
            flags="--draft --title $tag --generate-notes"
            [ "$is_prerelease" = true ] && flags="$flags --prerelease"
            gh release create "$tag" $flags
          fi
          gh release upload "$tag" "$PKG" --clobber

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain || true
